    <style>
      body {
        margin: 0;
        background: var(--body-bg, var(--app-bg, #0b0f14));
        color: var(--app-text, #e6edf3);
        font:
          500 16px/1.35 ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
      }
      #app {
        position: relative;
        min-height: 100dvh;
      }
      .boot {
        position: absolute;
        inset: 0;
        display: grid;
        place-content: center;
        padding: 20px;
        gap: 10px;
        text-align: center;
        background: var(--body-bg, var(--app-bg, #0b0f14));
        transition:
          opacity 240ms ease,
          transform 240ms ease,
          filter 240ms ease;
        will-change: opacity, transform, filter;
      }
      .boot.boot-out {
        opacity: 0;
        transform: scale(1.02);
        filter: blur(10px);
        pointer-events: none;
      }
      .boot-logo {
        width: 72px;
        height: 72px;
        margin: 0 auto 2px;
        opacity: 0.94;
        filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.25));
        animation: boot-pulse 1.8s ease-in-out infinite;
      }
      .boot-brand {
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 18px;
      }
      .boot-sub {
        opacity: 0.72;
        font-size: 14px;
      }
      .boot-bar {
        width: min(280px, 72vw);
        height: 2px;
        background: rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        overflow: hidden;
        position: relative;
      }
      .boot-bar::before {
        content: "";
        position: absolute;
        inset: 0;
        transform: translateX(-60%);
        background: linear-gradient(90deg, transparent, rgba(236, 72, 153, 0.85), transparent);
        animation: boot-slide 1.1s ease-in-out infinite;
      }
      @keyframes boot-pulse {
        0%,
        100% {
          transform: translateY(0) scale(1);
          opacity: 0.94;
        }
        50% {
          transform: translateY(-2px) scale(1.01);
          opacity: 1;
        }
      }
      @keyframes boot-slide {
        0% {
          transform: translateX(-60%);
        }
        50% {
          transform: translateX(60%);
        }
        100% {
          transform: translateX(160%);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot {
          transition: none;
        }
        .boot-bar::before {
          animation: none;
          opacity: 0.55;
          transform: none;
        }
        .boot-logo {
          animation: none;
        }
      }
    </style>
